apiVersion: v1
kind: ConfigMap
metadata: 
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
data:
  REDIS_URL: "redis://redis:6379"
  MONGO_URL: "mongodb://mongodb:27017/users"
  MONGO: "true"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  # using these labels replica set selects the pod and create replicas for that matched labels pod
  replicas: 1
  selector:
    matchLabels:  
      project: roboshop
      tier: backend
      component: user
   # This is pod definition, pod is subset of replica set
  template:
    metadata:
    labels:
      project: roboshop
      tier: backend
      component: user
    spec:
      containers: 
      - name: user
        image: manidevops20/user:1.0.0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "120m"
            memory: "64Mi"
          limits:
            cpu: "150m"
            memory: "128Mi"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: user
---
apiVersion: v1
kind: Service
metadata:
  name: user
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: user
spec:
  selector:
    project: roboshop
    tier: backend
    component: user
  ports:
  - protocol: TCP
    port: 8080 #service port
    targetPort: 8080  #container port