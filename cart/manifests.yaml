apiVersion: v1
kind: ConfigMap
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
data:
  REDIS_HOST: "redis"
  CATALOGUE_HOST: "catalogue"
  CATALOGUE_PORT: "8080"
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
  annotations:
    kubernetes.io/change-cause: "initial deployment cart:1.0.0"
spec:
  replicas: 1
  # using these labels replica set selects the pod and create replicas for that matched labels pod
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: cart
  # This is pod definition, pod is subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: cart
    spec:
      containers:
      - name: cart
        image: manidevops20/cart:1.0.0
        imagePullPolicy: Always
        resources:
          requests:
            cpu: "120m"
            memory: "100Mi"
        limits:
          cpu: "150m"
          memory: "150Mi"
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 5
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: cart
---
apiVersion: v1
kind: Service
metadata:
  name: cart
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: cart
spec:
  selector:
    project: roboshop
    tier: backend
    component: cart
  ports:
  - protocol: TCP
    port: 8080 #service port
    targetPort: 8080  #container port