apiVersion: v1
kind: ConfigMap
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
data:
  MONGO: "true"
  MONGO_URL: "mongodb://mongodb:27017/catalogue"

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalogue
  namespace: roboshop
  annotations:
    kubernetes.io/change-cause: "initial deployment catalogue:1.0.0"
  # these labels are replicaset labels
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  replicas: 1
  # using these labels replica set selects the pod and create replicas for that matched labels pod
  selector:
    matchLabels:
      project: roboshop
      tier: backend
      component: catalogue
  # This is pod definition, pod is subset of replica set
  template:
    metadata:
      labels:
        project: roboshop
        tier: backend
        component: catalogue
    spec:
      containers:
      - name: catalogue
        image: manidevops20/catalogue:1.0.0
        imagePullPolicy: Always # safe to pull everytime, there may be images with same version rebuilt and pushed 
        resources:
          requests:
            memory: "64Mi" #RAM
            cpu: "100m" #CPU  
          # hard limit, how much it can go upto
          limits:
            memory: "128Mi" #RAM
            cpu: "150m" #CPU 
        #it will verify whether the app inside container started or not,
        #once startup probe succeeds k8s will exectue liveness and rediness probes
        startupProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 3
          periodSeconds: 10
        #is your app ready to accept traffic
        readinessProbe:
          tcpSocket:
            port: 8080
          failureThreshold: 2
          initialDelaySeconds: 5
          periodSeconds: 10
        #check the health check if is not suceeded it will restart the container
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          failureThreshold: 2
          periodSeconds: 10
        envFrom:
        - configMapRef:
            name: catalogue
---
apiVersion: v1
kind: Service
metadata:
  name: catalogue
  namespace: roboshop
  labels:
    project: roboshop
    tier: backend
    component: catalogue
spec:
  selector:
  # labels are used as selectors
    project: roboshop
    tier: backend
    component: catalogue
  ports:
  - protocol: TCP
    port: 8080 #service port
    targetPort: 8080  #container port